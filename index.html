<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue-light: #7dd3fc;
  --blue-bright: #0ea5e9;
  --blue-deep: #0284c7;
  --blue-dark: #0369a1;
  --blue-surface: #082f49;
  --blue-surface-light: #0c4a6e;
  --white: #ffffff;
  --white-muted: #f0f9ff;
  --white-dim: #e0f2fe;
  --gold: #fbbf24;
  --red: #ef4444;
  --bg: #0c0f15;
  --bg-deep: #070a0f;
  --surface: #0f172a;
  --surface2: #1e293b;
  --surface3: #2d3a5e;
  --border: rgba(14, 165, 233, 0.2);
  --border2: rgba(14, 165, 233, 0.4);
  --text: #ffffff;
  --text2: #e0f2fe;
  --text3: #bae6fd;
  --text-muted: #7dd3fc;
  --shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
  --glow: 0 0 20px rgba(14, 165, 233, 0.2);
  --grad-primary: linear-gradient(135deg, #0ea5e9, #3b82f6);
  --grad-secondary: linear-gradient(135deg, #0284c7, #0ea5e9);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(14,165,233,0.08),transparent);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--blue-deep);border-radius:3px}

.app-layout{display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;transition:transform .3s}
.sidebar-logo{padding:1.5rem;border-bottom:1px solid var(--border)}
.sidebar-logo h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;background:var(--grad-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-logo span{font-size:0.7rem;color:var(--text-muted);display:block;margin-top:2px}
.sidebar-nav{flex:1;padding:1rem 0}
.nav-section-label{padding:0.5rem 1.25rem;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:600}
.nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.25rem;color:var(--text2);cursor:pointer;transition:all .2s;border-left:3px solid transparent;font-size:0.875rem;font-weight:500;text-decoration:none}
.nav-item:hover{background:rgba(14,165,233,0.1);color:var(--blue-light);border-left-color:var(--blue-bright)}
.nav-item.active{background:rgba(14,165,233,0.15);color:var(--blue-light);border-left-color:var(--blue-bright)}
.nav-icon{font-size:16px}
.sidebar-footer{padding:1.25rem;border-top:1px solid var(--border)}
.sidebar-user{display:flex;align-items:center;gap:0.75rem}
.sidebar-avatar{width:36px;height:36px;background:var(--grad-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;overflow:hidden;color:white}
.sidebar-avatar img{width:100%;height:100%;object-fit:cover}
.sidebar-user-info{flex:1;min-width:0}
.sidebar-user-name{font-size:0.8rem;font-weight:600;color:var(--text)}
.sidebar-user-role{font-size:0.7rem;color:var(--text-muted)}
.main-content{margin-left:240px;flex:1;padding:2rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
.topbar-left h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text)}
.topbar-left p{color:var(--text3);font-size:0.85rem;margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;transition:all .3s;position:relative;overflow:hidden}
.stat-card:hover{border-color:var(--border2);box-shadow:var(--glow)}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:0.75rem}
.stat-icon.green{background:rgba(14,165,233,0.15);color:var(--blue-light)}
.stat-icon.gold{background:rgba(14,165,233,0.15);color:var(--blue-light)}
.stat-icon.blue{background:rgba(14,165,233,0.2);color:var(--blue-bright)}
.stat-icon.purple{background:rgba(14,165,233,0.15);color:var(--blue-light)}
.stat-value{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--text)}
.stat-label{font-size:0.78rem;color:var(--text3);margin-top:2px}
.stat-change{font-size:0.72rem;color:var(--blue-light);margin-top:0.25rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.section-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text)}
.section-subtitle{font-size:0.78rem;color:var(--text-muted);margin-top:2px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.trending-list{display:flex;flex-direction:column;gap:0.75rem}
.trending-item{display:flex;align-items:center;gap:1rem;padding:1rem;background:var(--surface2);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:.2s;text-decoration:none;color:inherit}
.trending-item:hover{border-color:var(--border2)}
.trending-rank{width:28px;height:28px;border-radius:7px;background:rgba(14,165,233,0.12);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:var(--blue-light);flex-shrink:0}
.trending-info{flex:1;min-width:0}
.trending-name{font-size:0.875rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trending-tech{font-size:0.72rem;color:var(--text3);margin-top:2px}
.activity-feed{display:flex;flex-direction:column}
.activity-item{display:flex;align-items:flex-start;gap:1rem;padding:0.875rem 0;border-bottom:1px solid var(--border);font-size:0.82rem}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--blue-bright);margin-top:5px;flex-shrink:0}
.activity-text{flex:1;color:var(--text2);line-height:1.6}
.activity-text strong{color:var(--blue-light)}
.activity-time{color:var(--text-muted);font-size:0.73rem;white-space:nowrap}
.hamburger{display:none;position:fixed;top:1rem;left:1rem;z-index:200;width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:20px;align-items:center;justify-content:center;cursor:pointer}

@media (max-width: 768px){
  .hamburger{display:flex}
  .sidebar{transform:translateX(-100%);width:220px}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0;padding:1rem;width:100%}
  .topbar{flex-direction:column;align-items:flex-start;gap:.5rem;margin-top:3rem}
  .topbar-left h1{font-size:1.2rem}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:0.8rem}
  .dash-grid{flex-direction:column}
}
</style>
</head>
<body>
<button class="hamburger" onclick="toggleSidebar()">☰</button>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h2>🚀 AK ProjectHub</h2>
      <span>Developer Portfolio</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="index.html" class="nav-item active"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="projects.html" class="nav-item"><span class="nav-icon">📁</span> Projects</a>
      <div class="nav-section-label" style="margin-top:.5rem">Profile</div>
      <a href="portfolio.html" class="nav-item"><span class="nav-icon">👤</span> Portfolio</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">
          <img src="Profile.jpeg" alt="AK" onerror="this.style.display='none'">
        </div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">K Ansar</div>
          <div class="sidebar-user-role">Developer</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left"><h1>Dashboard</h1><p>Welcome back, Ansar! Here's your portfolio overview.</p></div>
    </div>
    
    <div class="stats-grid" id="statsGrid"></div>
    
    <div class="dash-grid">
      <div>
        <div class="section-header"><div><div class="section-title">🔥 Featured Projects</div><div class="section-subtitle">Top picks from the portfolio</div></div></div>
        <div class="trending-list" id="trendingList"></div>
      </div>
      <div>
        <div class="section-header"><div><div class="section-title">⚡ Recent Activity</div></div></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem">
          <div class="activity-feed" id="activityFeed"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// Project data (same for all pages)
const PROJECTS = [
  {
    id: 1,

    features: ['Interactive Excel Dashboard with slicers','Orders vs Sales analysis','Men vs Women sales comparison','Top 5 states revenue tracking'],

    images: ['screenshots/ak-store-dashboard/image1.png','screenshots/ak-store-dashboard/image2.png']
  },
  {

    overview: 'A deep learning-based healthcare web application that analyzes ECG images and predicts multiple cardiac conditions.',
    github: '#',
    createdAt: '2026-06-08',
    contributor: 'K Ansar',
    tools: ['Django','Python','TensorFlow','Keras','CNN','Bootstrap 5','Chart.js','SQLite'],
    features: ['AI-powered ECG image classification','Multi-class heart disease detection','Real-time ECG prediction with confidence scores'],

    images: ['screenshots/ecg-system/image1.png','screenshots/ecg-system/image2.png']
  },
  {
    id: 4,
    name: 'AgriSmart - AI-Driven Precision Farming Assistant',
    tech: 'Machine Learning',

    features: ['AI-powered fertilizer recommendation system','Smart irrigation water requirement prediction','Farmer dashboard with personalized farm profiles'],

    images: ['screenshots/agrismart/image1.png','screenshots/agrismart/image2.png']
  }

const ACTIVITY = [
  {text: 'Deployed <strong>Plant Disease Detector</strong> on AWS EC2', time: '2 days ago'},
  {text: 'Published <strong>Sales Analytics Dashboard</strong> on Streamlit', time: '1 week ago'},
  {text: 'Launched <strong>Portfolio with Blog</strong> on Vercel', time: '2 weeks ago'},
  {text: 'Completed <strong>Student Attendance System</strong>', time: '3 weeks ago'},
  {text: 'Shipped <strong>E-Commerce Platform</strong> v1.0', time: '1 month ago'},
];

function renderDashboard() {
  const stacks = [...new Set(PROJECTS.map(p => p.tech))];
  const totalImgs = PROJECTS.reduce((a,p) => a + (p.images ? p.images.length : 0), 0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-icon green">📁</div><div class="stat-value">20</div><div class="stat-label">Total Projects</div><div class="stat-change">↑ Growing portfolio</div></div>
    <div class="stat-card"><div class="stat-icon gold">🛠</div><div class="stat-value">17</div><div class="stat-label">Tech Stacks</div><div class="stat-change">Diverse expertise</div></div>
    <div class="stat-card"><div class="stat-icon blue">🖼</div><div class="stat-value">120</div><div class="stat-label">Screenshots</div><div class="stat-change">Across all projects</div></div>
    <div class="stat-card"><div class="stat-icon purple">🐙</div><div class="stat-value">20</div><div class="stat-label">GitHub Repos</div><div class="stat-change">All public</div></div>
  `;

  document.getElementById('trendingList').innerHTML = PROJECTS.slice(0,4).map((p,i) => `
    <a href="project-detail.html?id=${p.id}" class="trending-item">
      <div class="trending-rank">${i+1}</div>
      <div class="trending-info">
        <div class="trending-name">${p.name}</div>
        <div class="trending-tech">${p.tech}</div>
      </div>
      <span style="font-size:.75rem;color:var(--text-muted)">→</span>
    </a>
  `).join('');

  document.getElementById('activityFeed').innerHTML = ACTIVITY.map(a => `
    <div class="activity-item">
      <div class="activity-dot"></div>
      <div class="activity-text">${a.text}</div>
      <div class="activity-time">${a.time}</div>
    </div>
  `).join('');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

renderDashboard();
</script>
</body>
</html>
