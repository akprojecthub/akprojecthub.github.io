<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK ProjectHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue-light: #7dd3fc;
  --blue-bright: #0ea5e9;
  --blue-deep: #0284c7;
  --blue-dark: #0369a1;
  --blue-surface: #082f49;
  --blue-surface-light: #0c4a6e;
  --white: #ffffff;
  --white-muted: #f0f9ff;
  --white-dim: #e0f2fe;
  --gold: #fbbf24;
  --red: #ef4444;
  --bg: #0c0f15;
  --bg-deep: #070a0f;
  --surface: #0f172a;
  --surface2: #1e293b;
  --surface3: #2d3a5e;
  --border: rgba(14, 165, 233, 0.2);
  --border2: rgba(14, 165, 233, 0.4);
  --text: #ffffff;
  --text2: #e0f2fe;
  --text3: #bae6fd;
  --text-muted: #7dd3fc;
  --shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
  --glow: 0 0 20px rgba(14, 165, 233, 0.2);
  --grad-primary: linear-gradient(135deg, #0ea5e9, #3b82f6);
  --grad-secondary: linear-gradient(135deg, #0284c7, #0ea5e9);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(14,165,233,0.08),transparent);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--blue-deep);border-radius:3px}

.app-layout{display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;transition:transform .3s}
.sidebar-logo{padding:1.5rem;border-bottom:1px solid var(--border)}
.sidebar-logo h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;background:var(--grad-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-logo span{font-size:0.7rem;color:var(--text-muted);display:block;margin-top:2px}
.sidebar-nav{flex:1;padding:1rem 0}
.nav-section-label{padding:0.5rem 1.25rem;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:600}
.nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.25rem;color:var(--text2);cursor:pointer;transition:all .2s;border-left:3px solid transparent;font-size:0.875rem;font-weight:500;text-decoration:none}
.nav-item:hover{background:rgba(14,165,233,0.1);color:var(--blue-light);border-left-color:var(--blue-bright)}
.nav-item.active{background:rgba(14,165,233,0.15);color:var(--blue-light);border-left-color:var(--blue-bright)}
.nav-icon{font-size:16px}
.sidebar-footer{padding:1.25rem;border-top:1px solid var(--border)}
.sidebar-user{display:flex;align-items:center;gap:0.75rem}
.sidebar-avatar{width:36px;height:36px;background:var(--grad-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;overflow:hidden;color:white}
.sidebar-avatar img{width:100%;height:100%;object-fit:cover}
.sidebar-user-info{flex:1;min-width:0}
.sidebar-user-name{font-size:0.8rem;font-weight:600;color:var(--text)}
.sidebar-user-role{font-size:0.7rem;color:var(--text-muted)}
.main-content{margin-left:240px;flex:1;padding:2rem}
.detail-back{display:inline-flex;align-items:center;gap:0.5rem;color:var(--text3);cursor:pointer;font-size:0.85rem;margin-bottom:1.5rem;transition:.2s;background:none;border:none;text-decoration:none}
.detail-back:hover{color:var(--blue-light)}
.detail-header{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.detail-header::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(14,165,233,0.08),transparent);pointer-events:none}
.detail-tech-badge{display:inline-flex;padding:0.3rem 1rem;background:rgba(14,165,233,0.12);border:1px solid rgba(14,165,233,0.25);border-radius:999px;font-size:0.8rem;font-weight:600;color:var(--blue-light);margin-bottom:1rem}
.detail-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--text);margin-bottom:0.75rem}
.detail-meta{display:flex;align-items:center;flex-wrap:wrap;gap:1rem}
.detail-meta-item{display:flex;align-items:center;gap:0.4rem;font-size:0.8rem;color:var(--text3);text-decoration:none}
.detail-meta-item:hover{color:var(--blue-light)}
.detail-body{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;margin-bottom:1.5rem}
.detail-section{margin-bottom:1.75rem}
.detail-section:last-child{margin-bottom:0}
.detail-section h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--blue-light);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem}
.detail-section h3::after{content:'';flex:1;height:1px;background:var(--border)}
.detail-section p,.detail-section li{font-size:0.88rem;color:var(--text2);line-height:1.8}
.detail-section ul{list-style:none;padding:0}
.detail-section ul li{padding:0.3rem 0 0.3rem 1.2rem;position:relative}
.detail-section ul li::before{content:'▸';color:var(--blue-bright);position:absolute;left:0}
.tech-stack-section{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;margin-bottom:1.5rem}
.tech-layer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.875rem;margin-top:1rem}
.tech-layer{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;transition:border-color .2s}
.tech-layer:hover{border-color:var(--border2)}
.tech-layer-header{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem}
.tech-layer-icon{font-size:16px}
.tech-layer-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted)}
.tech-layer-pills{display:flex;flex-wrap:wrap;gap:4px}
.tech-pill{padding:3px 9px;border-radius:5px;font-size:0.72rem;font-weight:600;border:1px solid}
.tech-pill.frontend{background:rgba(14,165,233,0.12);border-color:rgba(14,165,233,0.25);color:var(--blue-light)}
.tech-pill.backend{background:rgba(14,165,233,0.1);border-color:rgba(14,165,233,0.22);color:var(--blue-light)}
.tech-pill.database{background:rgba(14,165,233,0.1);border-color:rgba(14,165,233,0.22);color:var(--blue-light)}
.tech-pill.ml{background:rgba(14,165,233,0.1);border-color:rgba(14,165,233,0.22);color:var(--blue-light)}
.tech-pill.devops{background:rgba(14,165,233,0.1);border-color:rgba(14,165,233,0.22);color:var(--blue-light)}
.tech-pill.analytics{background:rgba(14,165,233,0.1);border-color:rgba(14,165,233,0.22);color:var(--blue-light)}
.tech-pill.other{background:rgba(14,165,233,0.08);border-color:rgba(14,165,233,0.18);color:var(--text3)}
.gallery-section{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;margin-bottom:1.5rem}
.gallery-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.gallery-header-left{display:flex;align-items:center;gap:0.75rem}
.gallery-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text)}
.gallery-count-badge{background:rgba(14,165,233,0.12);border:1px solid rgba(14,165,233,0.25);border-radius:999px;padding:2px 10px;font-size:0.72rem;font-weight:700;color:var(--blue-light)}
.gallery-view-btns{display:flex;gap:4px}
.gallery-view-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.gallery-view-btn.active,.gallery-view-btn:hover{background:rgba(14,165,233,0.12);border-color:var(--border2);color:var(--blue-light)}
.gallery-grid-view{display:grid;gap:0.75rem}
.gallery-grid-view.cols-3{grid-template-columns:repeat(3,1fr)}
.gallery-grid-view.cols-2{grid-template-columns:repeat(2,1fr)}
.gallery-item{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid var(--border);background:var(--surface2);transition:border-color .2s}
.gallery-item:hover{border-color:var(--border2)}
.gallery-grid-view .gallery-item{aspect-ratio:16/10}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.gallery-item:hover img{transform:scale(1.04)}
.gallery-item-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 50%);opacity:0;transition:opacity .25s;display:flex;align-items:flex-end;padding:0.75rem}
.gallery-item:hover .gallery-item-overlay{opacity:1}
.gallery-item-label{font-size:0.72rem;font-weight:600;color:#fff}
.gallery-item-zoom{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:6px;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:opacity .2s}
.gallery-item:hover .gallery-item-zoom{opacity:1}
.gallery-grid-view.cols-3 .gallery-item:first-child{grid-column:1/3;aspect-ratio:16/7}
.gallery-strip{display:flex;gap:0.75rem;overflow-x:auto;padding-bottom:0.5rem;scroll-snap-type:x mandatory}
.gallery-strip::-webkit-scrollbar{height:4px}
.gallery-strip::-webkit-scrollbar-track{background:var(--surface)}
.gallery-strip::-webkit-scrollbar-thumb{background:var(--blue-deep);border-radius:2px}
.gallery-strip .gallery-item{flex:0 0 220px;height:138px;scroll-snap-align:start}
.hamburger{display:none;position:fixed;top:1rem;left:1rem;z-index:200;width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:20px;align-items:center;justify-content:center;cursor:pointer}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox-inner{position:relative;max-width:90vw;max-height:88vh;display:flex;flex-direction:column;align-items:center;gap:1rem}
.lightbox-img{max-width:100%;max-height:78vh;border-radius:12px;object-fit:contain;border:1px solid rgba(14,165,233,0.2)}
.lightbox-close{position:absolute;top:-48px;right:-4px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.lightbox-close:hover{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.4)}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;z-index:10}
.lightbox-nav:hover{background:rgba(14,165,233,0.25);border-color:rgba(14,165,233,0.5)}
.lightbox-prev{left:-64px}
.lightbox-next{right:-64px}
.lightbox-footer{display:flex;align-items:center;gap:1rem}
.lightbox-counter{background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);padding:0.35rem 1rem;border-radius:999px;font-size:0.78rem;color:var(--text2);border:1px solid rgba(255,255,255,0.08)}
.lightbox-thumbnails{display:flex;gap:6px;overflow-x:auto;max-width:70vw;padding:4px}
.lightbox-thumbnails::-webkit-scrollbar{height:3px}
.lb-thumb{width:48px;height:32px;border-radius:5px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.2s;flex-shrink:0}
.lb-thumb img{width:100%;height:100%;object-fit:cover}
.lb-thumb.active{border-color:var(--blue-bright)}
.lb-thumb:not(.active):hover{border-color:var(--border2)}

@media (max-width: 768px){
  .hamburger{display:flex}
  .sidebar{transform:translateX(-100%);width:220px}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0;padding:1rem;width:100%}
  .detail-title{font-size:1.3rem}
  .detail-header,.detail-body,.tech-stack-section,.gallery-section{padding:1rem}
  .detail-meta{flex-direction:column;align-items:flex-start;gap:.5rem}
  .gallery-grid-view.cols-3,.gallery-grid-view.cols-2{grid-template-columns:1fr}
  .gallery-grid-view.cols-3 .gallery-item:first-child{grid-column:auto;aspect-ratio:16/10}
  .lightbox-prev{left:10px}
  .lightbox-next{right:10px}
  .lightbox-thumbnails{display:none}
  .tech-layer-grid{grid-template-columns:1fr}
  .detail-back{margin-top:3rem}
}
</style>
</head>

<div class="lightbox" id="lightbox" onclick="handleLightboxClick(event)">

  </div>
</div>

let lightboxImages = [];
let lightboxIndex = 0;

function getProjectFromURL() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  return PROJECTS.find(p => p.id === id);
}

function renderProjectDetail() {
  const p = getProjectFromURL();
  if (!p) {
    document.getElementById('projectDetail').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>Project not found</p></div>';
    return;
  }

  document.getElementById('detailTechBadge').textContent = p.tech;
  document.getElementById('detailTitle').textContent = p.name;
  document.getElementById('detailMeta').innerHTML = `
    <span class="detail-meta-item">📅 ${p.createdAt}</span>
    <span class="detail-meta-item">👤 ${p.contributor}</span>
    ${p.github && p.github !== '#' ? `<a href="${p.github}" target="_blank" class="detail-meta-item" style="color:var(--g6)">🐙 GitHub Repository</a>` : ''}
  `;

  renderTechStack(p);
  renderGallery(p);

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section">
      <h3>📋 Project Overview</h3>
      <p>${p.overview}</p>
    </div>
    <div class="detail-section">
      <h3>✨ Key Features</h3>
      <ul>${(p.features||[]).map(f=>`<li>${f}</li>`).join('')}</ul>
    </div>
    <div class="detail-section">
      <h3>🎯 Outcomes & Impact</h3>
      <ul>${(p.outcomes||[]).map(o=>`<li>${o}</li>`).join('')}</ul>
    </div>
    <div class="detail-section">
      <h3>👤 Contributor</h3>
      <p>${p.contributor}</p>
    </div>
  `;
}

function renderTechStack(p) {
  const el = document.getElementById('detailTechStack');
  if (!p.techStack || p.techStack.length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
      <div>
        <div style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text)">🔧 Technologies Used</div>
        <div style="font-size:0.75rem;color:var(--text-muted);margin-top:3px">Stack breakdown by layer</div>
      </div>
      <div style="font-size:0.72rem;color:var(--text-muted);background:rgba(34,197,94,0.07);border:1px solid var(--border);border-radius:6px;padding:3px 10px">${p.techStack.reduce((a,l)=>a+l.tools.length,0)} technologies</div>
    </div>
    <div class="tech-layer-grid">
      ${p.techStack.map(layer => `
        <div class="tech-layer">
          <div class="tech-layer-header">
            <span class="tech-layer-icon">${layer.icon}</span>
            <span class="tech-layer-label">${layer.label}</span>
          </div>
          <div class="tech-layer-pills">
            ${layer.tools.map(t => `<span class="tech-pill ${layer.type}">${t}</span>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

let galleryMode = 'grid';

function renderGallery(p) {
  const el = document.getElementById('detailGallery');
  if (!p.images || p.images.length === 0) { el.style.display = 'none'; return; }
  lightboxImages = p.images;
  el.style.display = 'block';
  el.innerHTML = buildGalleryHTML(p.images, galleryMode);
}

function buildGalleryHTML(images, mode) {
  const cols = images.length <= 2 ? 'cols-2' : 'cols-3';
  return `
    <div class="gallery-header">
      <div class="gallery-header-left">
        <div class="gallery-title">🖼 Project Screenshots</div>
        <div class="gallery-count-badge">${images.length} image${images.length>1?'s':''}</div>
      </div>
      <div class="gallery-view-btns">
        <button class="gallery-view-btn ${mode==='grid'?'active':''}" onclick="switchGalleryMode('grid')" title="Grid view">▦</button>
        <button class="gallery-view-btn ${mode==='strip'?'active':''}" onclick="switchGalleryMode('strip')" title="Strip view">▤</button>
      </div>
    </div>
    ${mode === 'grid'
      ? `<div class="gallery-grid-view ${cols}">
          ${images.map((img, i) => galleryItemHTML(img, i)).join('')}
         </div>`
      : `<div class="gallery-strip">
          ${images.map((img, i) => galleryItemHTML(img, i)).join('')}
         </div>`
    }
  `;
}

function galleryItemHTML(img, i) {
  return `
    <div class="gallery-item" onclick="openLightbox(${i})">
      <img src="${img}" alt="Screenshot ${i+1}" onerror="this.parentElement.style.display='none'">
      <div class="gallery-item-overlay">
        <span class="gallery-item-label">Screenshot ${i+1}</span>
      </div>
      <div class="gallery-item-zoom">🔍</div>
    </div>
  `;
}

function switchGalleryMode(mode) {
  galleryMode = mode;
  const p = getProjectFromURL();
  if (p) renderGallery(p);
}

// Lightbox functions
function openLightbox(index) {
  lightboxIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

function lightboxNav(dir) {
  lightboxIndex = (lightboxIndex + dir + lightboxImages.length) % lightboxImages.length;
  updateLightbox();
}

function updateLightbox() {
  document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
  document.getElementById('lightboxCounter').textContent = `${lightboxIndex+1} / ${lightboxImages.length}`;
  
  const showNav = lightboxImages.length > 1;
  document.querySelector('.lightbox-prev').style.display = showNav ? 'flex' : 'none';
  document.querySelector('.lightbox-next').style.display = showNav ? 'flex' : 'none';

  const thumbsEl = document.getElementById('lightboxThumbs');
  thumbsEl.innerHTML = lightboxImages.map((img, i) => `
    <div class="lb-thumb ${i===lightboxIndex?'active':''}" onclick="lightboxJump(${i})">
      <img src="${img}" alt="Thumb ${i+1}" onerror="this.parentElement.style.display='none'">
    </div>
  `).join('');
}

function lightboxJump(i) {
  lightboxIndex = i;
  updateLightbox();
}

function handleLightboxClick(e) {
  if (e.target === e.currentTarget) closeLightbox();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') lightboxNav(1);
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'Escape') closeLightbox();
});

renderProjectDetail();
</script>
